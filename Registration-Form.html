<!doctype html>
<html>
  <head>
    <title>Student Registration</title>

    <style>
      body {
        font-family: Arial;
        background: #f2f2f2;
      }

      section {
        width: 400px;
        margin: 40px auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px gray;
      }

      .field {
        display: flex;
        align-items: center;
      }

      .field span {
        margin-right: 8px;
        font-size: 18px;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 8px;
        margin: 8px 0;
      }

      textarea {
        height: 80px;
      }

      input[type="submit"],
      input[type="reset"] {
        background: #333;
        color: white;
        border: none;
        padding: 10px;
        cursor: pointer;
      }

      #success {
        display: none;
        color: green;
        text-align: center;
        font-weight: bold;
        margin-bottom: 10px;
      }

      #success:target {
        display: block;
      }
    </style>
  </head>

  <body>
    <section>
      <div id="success">Registration Successful!</div>

      <h2>Registration Form</h2>

      <form id="regForm" action="#success">
        <div class="field">
          <span>👤</span>
          <input type="text" placeholder="Name" required />
        </div>

        <div class="field">
          <span>📅</span>
          <input type="text" placeholder="Date of Birth (DD-MM-YYYY)" />
        </div>

        <div class="field">
          <span>📱</span>
          <input type="text" placeholder="Phone" />
        </div>

        <div class="field">
          <span>📧</span>
          <input type="email" placeholder="Email" required />
        </div>

        <div class="field">
          <span>🔒</span>
          <input type="password" placeholder="Password" required />
        </div>

        <div class="field">
          <span>⚧️</span>
          <select required>
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
          </select>
        </div>

        <div class="field">
          <span>🎓</span>
          <select required>
            <option value="">Select Course</option>
            <option>B.Tech</option>
            <option>B.Sc</option>
          </select>
        </div>

        <div class="field">
          <span>📷</span>
          <input type="file" />
        </div>

        <div class="field">
          <span>🏠</span>
          <textarea placeholder="Address"></textarea>
        </div>

        <div class="field">
          <span>🏙️</span>
          <input type="text" placeholder="City" />
        </div>

        <div class="field">
          <span>📍</span>
          <input type="text" placeholder="State" />
        </div>

        <div class="field">
          <span>🔢</span>
          <input type="text" placeholder="Pincode" />
        </div>

        <input
          type="submit"
          value="Submit"
          onclick="alert('Registration Successful!')"
        />
      </form>

      <input type="reset" form="regForm" value="Reset Form" />
    </section>
  </body>
</html>
