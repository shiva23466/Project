<!doctype html>
<html>
  <head>
    <title>Student Registration</title>

    <style>
      body {
        font-family: Arial;
        background: #f2f2f2;
      }

      section {
        width: 400px;
        margin: 40px auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px gray;
      }

      input,
      select,
      textarea {
        width: 100%;
        padding: 8px;
        margin: 8px 0;
      }

      textarea {
        height: 80px;
      }

      input[type="submit"],
      input[type="reset"] {
        background: #333;
        color: white;
        border: none;
        padding: 10px;
        cursor: pointer;
      }

      #success {
        display: none;
        color: green;
        text-align: center;
        font-weight: bold;
        margin-bottom: 10px;
      }

      #success:target {
        display: block;
      }
    </style>
  </head>

  <body>
    <section>
      <div id="success">Registration Successful!</div>

      <h2>Registration Form</h2>

      <form id="regForm" action="#success">
        <span>👤</span>
        <input type="text" placeholder="Name" required />

        <span>📧</span>
        <input type="email" placeholder="Email" required />

        <span>📱</span>
        <input type="text" placeholder="Phone" />

        <span>⚧️</span>
        <select required>
          <option value="">Select Gender</option>
          <option>Male</option>
          <option>Female</option>
        </select>

        <span>🎓</span>
        <select required>
          <option value="">Select Graduation</option>
          <option>B.Tech</option>
          <option>B.Sc</option>
        </select>

        <span>📷</span>
        <input type="file" />

        <span>🏠</span>
        <textarea placeholder="Address"></textarea>

        <span>🏙️</span>
        <input type="text" placeholder="City" />

        <span>📍</span>
        <input type="text" placeholder="State" />

        <span>🔢</span>
        <input type="text" placeholder="Pincode" />

        <input type="submit" value="Submit" />
      </form>

      <input type="reset" form="regForm" value="Reset Form" />
    </section>
  </body>
</html>
